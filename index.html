<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Real-Time Weather</title>
    <meta name="description" content="Discover real-time weather updates with SkyCast. Search for any city and get instant details on temperature, humidity, and wind speed.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>
    
    <main class="container">
        <header>
            <h1 class="logo">SkyCast</h1>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search for a city..." autocomplete="off">
                <button id="search-btn" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </header>

        <section class="weather-card" id="weather-card">
            <div class="placeholder-content">
                <p>Enter a city to see the magic happen.</p>
            </div>
            
            <div class="weather-info hidden" id="weather-info">
                <div class="main-weather">
                    <div id="weather-icon-container">
                        <!-- Icon will be injected here -->
                    </div>
                    <div class="temp-container">
                        <span class="temperature" id="temperature">--</span>
                        <span class="unit">°C</span>
                    </div>
                    <h2 class="city-name" id="display-city-name">City Name</h2>
                    <p class="description" id="weather-description">Condition</p>
                </div>

                <div class="details-grid">
                    <div class="detail-item">
                        <div class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                        </div>
                        <div class="text">
                            <p class="label">Humidity</p>
                            <p class="value" id="humidity">--%</p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
                        </div>
                        <div class="text">
                            <p class="label">Wind Speed</p>
                            <p class="value" id="wind-speed">-- km/h</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="loader hidden" id="loader">
                <div class="spinner"></div>
            </div>
            
            <div class="error-message hidden" id="error-message">
                <p>Oops! Something went wrong. Please try again.</p>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
